<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunAway - 대사관 철수 현황</title>
<meta name="description" content="전 세계 대사관 철수 현황을 실시간으로 확인하세요.">
<meta property="og:title" content="🌍 RunAway - 대사관 철수 현황">
<meta property="og:description" content="여행 전 꼭 확인! 전 세계 대사관 실시간 철수 현황">
<meta property="og:url" content="https://web-production-bbd77.up.railway.app">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RunAway">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c53030;--red-bg:#fff5f5;--red-bd:#fed7d7;--org:#c05621;--org-bg:#fffaf0;--org-bd:#feebc8;--grn:#276749;--grn-bg:#f0fff4;--grn-bd:#c6f6d5;--pri:#111;--gray:#f5f5f5;--bd:#eee}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:70px}
.header{background:#fff;padding:.9rem 1.25rem .75rem;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:17px;font-weight:700;color:var(--pri)}
.hdr-right{display:flex;align-items:center;gap:8px}
.live-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--red);font-weight:600}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lang-btn{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--bd);background:transparent;cursor:pointer;font-family:inherit;font-weight:600}
.lang-btn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--gray);border-radius:10px;padding:8px 12px;margin-bottom:10px}
.search-bar input{border:none;background:transparent;font-size:14px;color:var(--pri);outline:none;flex:1;font-family:inherit}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;border:1px solid var(--bd);background:transparent;color:#666;cursor:pointer;font-family:inherit}
.fbtn.on{background:var(--pri);border-color:var(--pri);color:#fff;font-weight:600}
.alert-box{margin:8px 12px 0;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red);line-height:1.5}
.notif-box{margin:8px 12px 0;background:var(--org-bg);border:1px solid var(--org-bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.notif-box span{font-size:12px;color:var(--org)}
.notif-box button{padding:4px 12px;background:var(--org);color:#fff;border:none;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit}
.viral-banner{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:2px solid #ef4444;padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.viral-left{display:flex;align-items:center;gap:8px;font-size:12px;color:#fca5a5}
.viral-pulse{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite;flex-shrink:0}
.viral-right{font-size:11px;color:#64748b}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px}
.stat{background:var(--gray);border-radius:10px;padding:10px;text-align:center;cursor:pointer}
.stat-num{font-size:22px;font-weight:700}
.stat-num.r{color:var(--red)}.stat-num.o{color:var(--org)}.stat-num.g{color:var(--grn)}
.stat-lbl{font-size:10px;color:#888;margin-top:2px}
.legend{display:flex;gap:12px;padding:0 12px 6px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.legdot{width:7px;height:7px;border-radius:50%}
.sec-lbl{font-size:11px;font-weight:600;color:#999;padding:6px 12px 4px;letter-spacing:.05em;text-transform:uppercase}
.clist{padding:0 10px 1rem;display:flex;flex-direction:column;gap:8px}
.ccard{background:#fff;border-radius:14px;border:1px solid var(--bd);padding:12px 14px;cursor:pointer;position:relative}
.ctop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.flagimg{width:28px;height:20px;border-radius:3px;object-fit:cover;flex-shrink:0}
.flagfb{width:28px;height:20px;background:#eee;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;flex-shrink:0}
.cname{font-size:14px;font-weight:600;color:var(--pri);flex:1}
.lvl{flex-shrink:0;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.lvl-위험{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.lvl-주의요망{background:var(--org-bg);color:var(--org);border:1px solid var(--org-bd)}
.lvl-안전{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd)}
.embs{display:flex;flex-wrap:wrap;gap:5px}
.echip{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid}
.eflag{width:16px;height:11px;border-radius:2px;object-fit:cover}
.e-red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.e-yellow{background:var(--org-bg);border-color:var(--org-bd);color:var(--org)}
.e-green{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn)}
.favbtn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;opacity:.4}
.favbtn.on{opacity:1}
#mapView{display:none}
#map{height:calc(100vh - 180px)}
#favView{display:none;padding:0 10px}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px;white-space:pre-line}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--bd);display:flex;z-index:200}
.nbtn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#999;cursor:pointer;border:none;background:none;font-family:inherit}
.nbtn.on{color:var(--pri)}
.nicon{font-size:22px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:1.5rem 1.25rem 2rem;position:relative}
.mhandle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 1.25rem}
.mhdr{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.mflag{width:40px;height:28px;border-radius:4px;object-fit:cover}
.mcountry{font-size:20px;font-weight:700;flex:1}
.mlvl{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600}
.msec{margin-bottom:1.25rem}
.msec-title{font-size:12px;font-weight:700;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.news-item{padding:10px 0;border-bottom:1px solid var(--bd)}
.news-item:last-child{border-bottom:none}
.news-title{font-size:13px;font-weight:500;color:var(--pri);line-height:1.4;margin-bottom:4px}
.news-title a{color:inherit;text-decoration:none}
.news-meta{font-size:11px;color:#aaa}
.hist-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px}
.hist-item:last-child{border-bottom:none}
.pill{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill-red{background:var(--red-bg);color:var(--red)}
.pill-yellow{background:var(--org-bg);color:var(--org)}
.pill-green{background:var(--grn-bg);color:var(--grn)}
.mclose{position:absolute;top:1rem;right:1rem;background:var(--gray);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer}
.loading{text-align:center;padding:1.5rem;color:#aaa;font-size:13px}
.spin{width:24px;height:24px;border:2px solid #eee;border-top-color:#666;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.pg-info{text-align:center;font-size:12px;color:#999;margin:4px 0 10px}
.pg-btns{display:flex;justify-content:center;align-items:center;gap:4px;padding:0 12px 16px}
.pgbtn{min-width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:#fff;font-size:14px;cursor:pointer;font-family:inherit;color:var(--pri)}
.pgbtn.on{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:700}
.pgbtn.disabled{opacity:.3;cursor:not-allowed}
.pgdot{color:#aaa;font-size:14px;padding:0 2px}
#pagination{padding:8px 12px 0}
.share-row{display:flex;gap:8px;margin-top:4px}
.share-btn{flex:1;padding:10px 0;border-radius:12px;border:1px solid var(--bd);background:var(--gray);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;color:var(--pri)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.report-write{background:var(--gray);border-radius:12px;padding:12px;margin-bottom:12px}
.report-nick{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:8px;background:#fff}
.report-text{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;resize:none;height:70px;background:#fff}
.report-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.report-count{font-size:11px;color:#aaa}
.report-submit{padding:6px 16px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.report-item{padding:10px 0;border-bottom:1px solid var(--bd)}
.report-item:last-child{border-bottom:none}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.report-nick-label{font-size:12px;font-weight:600;color:var(--pri)}
.report-time{font-size:11px;color:#aaa}
.report-content{font-size:13px;color:#333;line-height:1.5;margin-bottom:6px}
.report-like{display:flex;align-items:center;gap:4px;font-size:12px;color:#aaa;cursor:pointer;border:none;background:none;font-family:inherit}
.report-like.liked{color:var(--red)}
.report-empty{text-align:center;padding:1.5rem;color:#aaa;font-size:13px}
.evac-section{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:14px;margin-bottom:12px}
.evac-title{font-size:13px;font-weight:700;color:#c2410c;margin-bottom:10px}
.evac-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #fed7aa}
.evac-item:last-child{border-bottom:none}
.evac-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.evac-info{flex:1}
.evac-label{font-size:11px;color:#9a3412;font-weight:600;margin-bottom:2px}
.evac-value{font-size:13px;color:#1c1917;line-height:1.4}
.evac-value a{color:#c2410c;text-decoration:none;font-weight:600}
.safe-countries{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.safe-chip{padding:3px 10px;background:#dcfce7;border:1px solid #bbf7d0;border-radius:20px;font-size:11px;color:#166534;font-weight:500}
.share-float{position:fixed;bottom:80px;right:16px;z-index:150;display:flex;flex-direction:column;gap:8px}
.share-float-btn{width:48px;height:48px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.share-float-kakao{background:#fee500}
.share-float-copy{background:#111;color:white}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title" id="T_title">🌍 대사관 철수 현황</span>
      <div class="hdr-right">
        <div class="live-badge"><span class="live-dot"></span><span id="T_live">실시간</span></div>
        <button class="lang-btn on" onclick="setLang('ko')">KO</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
    <div class="search-bar" id="searchBar">
      <span style="color:#aaa">🔍</span>
      <input type="text" id="searchInput" placeholder="나라 검색..." oninput="render()">
    </div>
    <div class="filter-row" id="filterRow">
      <button class="fbtn on" onclick="setF('all',this)" id="T_all">전체</button>
      <button class="fbtn" onclick="setF('위험',this)" id="T_danger">🔴 위험</button>
      <button class="fbtn" onclick="setF('주의요망',this)" id="T_warn">🟡 주의요망</button>
      <button class="fbtn" onclick="setF('안전',this)" id="T_safe">🟢 안전</button>
    </div>
  </div>
  <div class="viral-banner">
    <div class="viral-left"><div class="viral-pulse"></div><span id="viralText">실시간 업데이트 중...</span></div>
    <div class="viral-right" id="viralRight">🌍 전 세계 모니터링</div>
  </div>
  <div id="notifBox" class="notif-box" style="display:none">
    <span>즐겨찾기 나라 알림을 받으시겠어요?</span>
    <button onclick="reqNotif()">알림 허용</button>
  </div>
  <div id="alertBox" class="alert-box" style="display:none"></div>
  <div id="listView">
    <div class="stats">
      <div class="stat" onclick="setF('위험',document.getElementById('T_danger'))"><div class="stat-num r" id="s1">-</div><div class="stat-lbl">위험</div></div>
      <div class="stat" onclick="setF('주의요망',document.getElementById('T_warn'))"><div class="stat-num o" id="s2">-</div><div class="stat-lbl">주의요망</div></div>
      <div class="stat" onclick="setF('안전',document.getElementById('T_safe'))"><div class="stat-num g" id="s3">-</div><div class="stat-lbl">안전</div></div>
    </div>
    <div class="legend">
      <div class="leg"><span class="legdot" style="background:#e53e3e"></span><span>철수 완료</span></div>
      <div class="leg"><span class="legdot" style="background:#dd6b20"></span><span>철수 대기</span></div>
      <div class="leg"><span class="legdot" style="background:#38a169"></span><span>정상 운영</span></div>
    </div>
    <div class="sec-lbl">국가별 현황</div>
    <div class="clist" id="list"><div class="loading"><div class="spin"></div>데이터 불러오는 중...</div></div>
    <div id="pagination"></div>
  </div>
  <div id="mapView"><div id="map"></div></div>
  <div id="favView"><div class="clist" id="favList"></div></div>
</div>
<div class="share-float">
  <button class="share-float-btn share-float-kakao" onclick="shareApp('kakao')">🟡</button>
  <button class="share-float-btn share-float-copy" onclick="shareApp('copy')">🔗</button>
</div>
<div class="bottom-nav">
  <button class="nbtn on" onclick="switchTab('list',this)"><span class="nicon">📋</span><span>목록</span></button>
  <button class="nbtn" onclick="switchTab('map',this)"><span class="nicon">🗺️</span><span>지도</span></button>
  <button class="nbtn" onclick="switchTab('fav',this)"><span class="nicon">⭐</span><span>즐겨찾기</span></button>
</div>
<div class="overlay" id="overlay" onclick="closeM(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <button class="mclose" onclick="closeM()">✕</button>
    <div class="mhdr">
      <img class="mflag" id="mFlag" src="">
      <span class="mcountry" id="mName"></span>
      <span class="mlvl" id="mLvl"></span>
    </div>
    <div class="msec">
      <div class="msec-title">대사관 현황</div>
      <div class="embs" id="mEmbs"></div>
    </div>
    <div class="msec">
      <div class="msec-title">📰 최신 뉴스</div>
      <div id="mNews"><div class="loading"><div class="spin"></div></div></div>
    </div>
    <div class="msec">
      <div class="msec-title">📊 경보 변동 히스토리</div>
      <div id="mHist"><div class="loading"><div class="spin"></div></div></div>
    </div>
    <div id="evacSection" class="msec" style="display:none">
      <div id="evacContent"></div>
    </div>
    <div class="msec">
      <div class="msec-title">📢 현지 제보</div>
      <div class="report-write">
        <input class="report-nick" id="reportNick" placeholder="닉네임 (최대 20자)" maxlength="20">
        <textarea class="report-text" id="reportText" placeholder="현지 상황을 제보해주세요 (최대 140자)" maxlength="140" oninput="document.getElementById('reportCharCount').textContent=this.value.length"></textarea>
        <div class="report-footer">
          <span class="report-count"><span id="reportCharCount">0</span>/140</span>
          <button class="report-submit" onclick="submitReport()">제보하기</button>
        </div>
      </div>
      <div id="reportList"><div class="loading"><div class="spin"></div></div></div>
    </div>
    <div class="share-row">
      <button class="share-btn" onclick="shareCountry('kakaotalk')">🟡 카카오톡</button>
      <button class="share-btn" onclick="shareCountry('twitter')">🐦 X</button>
      <button class="share-btn" onclick="shareCountry('copy')">🔗 링크 복사</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var API = (window.location.hostname==='127.0.0.1'||window.location.hostname==='localhost') ? 'http://127.0.0.1:5000' : '';
var data = [], filt = 'all', tab = 'list', lang = localStorage.getItem('lang')||'ko', map = null, mapOK = false;
var currentCountry = null, currentCountryEn = null;
var favs = JSON.parse(localStorage.getItem('EFav')||'[]');
var likedReports = JSON.parse(localStorage.getItem('likedReports')||'[]');

function saveFav(){localStorage.setItem('EFav',JSON.stringify(favs));}

function togFav(name,e){
  e.stopPropagation();
  if(favs.indexOf(name)>=0){favs=favs.filter(function(f){return f!==name;});}
  else{favs.push(name);}
  saveFav();render();renderFav();
}

function initMap(){
  if(mapOK)return;mapOK=true;
  map=L.map('map').setView([20,20],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'CartoDB'}).addTo(map);
  updateMarkers();
}

function updateMarkers(){
  if(!map)return;
  map.eachLayer(function(l){if(l instanceof L.CircleMarker)map.removeLayer(l);});
  var COL={"위험":"#e53e3e","주의요망":"#dd6b20","안전":"#38a169"};
  data.forEach(function(c){
    var coord=COORDS[c.country_name];if(!coord)return;
    var color=COL[c.level];
    L.circleMarker(coord,{radius:c.level==="위험"?10:c.level==="주의요망"?7:5,fillColor:color,color:"#fff",weight:1.5,opacity:1,fillOpacity:.85})
     .addTo(map).bindPopup('<b>'+(lang==='ko'?c.country_name:c.country_name_en)+'</b>').on('click',function(){openM(c);});
  });
}

function renderFav(){
  var fd=data.filter(function(c){return favs.indexOf(c.country_name)>=0;});
  document.getElementById('favList').innerHTML=fd.length?fd.map(function(c){return card(c);}).join(''):'<div class="empty">⭐ 즐겨찾기한 나라가 없어요</div>';
}

function card(c){
  var code=CODE[c.country_name];
  var isFav=favs.indexOf(c.country_name)>=0;
  var flag=code?'<img class="flagimg" src="https://flagcdn.com/w40/'+code+'.png" onerror="this.style.display=\'none\'">':'<div class="flagfb">'+c.country_name.slice(0,2)+'</div>';
  var name=lang==='ko'?c.country_name:c.country_name_en;
  var lvlTxt=lang==='ko'?c.level:(LVL_EN[c.level]||c.level);
  var chips=(c.embassies||[]).map(function(e){
    var sc=SC[e.name];
    var sf=sc?'<img class="eflag" src="https://flagcdn.com/w20/'+sc+'.png">':'';
    var lbl=lang==='ko'?e.label:(LBL_EN[e.label]||e.label);
    return '<div class="echip e-'+e.status+'">'+sf+'<span>'+e.name+' '+lbl+'</span></div>';
  }).join('');
  var cd=JSON.stringify(c).replace(/"/g,'&quot;');
  return '<div class="ccard" onclick="openM('+cd+')">'
    +'<button class="favbtn '+(isFav?'on':'')+'" onclick="togFav(\''+c.country_name+'\',event)">'+(isFav?'⭐':'☆')+'</button>'
    +'<div class="ctop">'+flag+'<span class="cname">'+name+'</span><span class="lvl lvl-'+c.level+'">'+lvlTxt+'</span></div>'
    +'<div class="embs">'+chips+'</div></div>';
}

function render(){
  var q=document.getElementById('searchInput').value.trim();
  var ord={"위험":0,"주의요망":1,"안전":2};
  filteredData=data.filter(function(c){
    var mQ=!q||c.country_name.indexOf(q)>=0||(c.country_name_en||'').toLowerCase().indexOf(q.toLowerCase())>=0;
    var mF=filt==='all'||c.level===filt;
    return mQ&&mF;
  }).sort(function(a,b){return (ord[a.level]-ord[b.level])||b.red_count-a.red_count;});
  curPage=1;
  renderPage();
}

function renderPage(){
  var total=filteredData.length;
  var totalPages=Math.ceil(total/PER_PAGE)||1;
  var start=(curPage-1)*PER_PAGE;
  var pageData=filteredData.slice(start,start+PER_PAGE);
  var listEl=document.getElementById('list');
  if(!total){listEl.innerHTML='<div class="empty">검색 결과가 없어요</div>';document.getElementById('pagination').innerHTML='';return;}
  listEl.innerHTML=pageData.map(function(c){return card(c);}).join('');
  var pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  var btns='<button class="pgbtn'+(curPage===1?' disabled':'')+'" onclick="goPage('+(curPage-1)+')">‹</button>';
  var sp=Math.max(1,curPage-2),ep=Math.min(totalPages,sp+4);
  if(ep-sp<4)sp=Math.max(1,ep-4);
  if(sp>1)btns+='<button class="pgbtn" onclick="goPage(1)">1</button>'+(sp>2?'<span class="pgdot">…</span>':'');
  for(var i=sp;i<=ep;i++)btns+='<button class="pgbtn'+(i===curPage?' on':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  if(ep<totalPages)btns+=(ep<totalPages-1?'<span class="pgdot">…</span>':'')+'<button class="pgbtn" onclick="goPage('+totalPages+')">'+totalPages+'</button>';
  btns+='<button class="pgbtn'+(curPage===totalPages?' disabled':'')+'" onclick="goPage('+(curPage+1)+')">›</button>';
  pg.innerHTML='<div class="pg-info">'+total+'개 국가 · '+curPage+'/'+totalPages+' 페이지</div><div class="pg-btns">'+btns+'</div>';
}

function goPage(p){
  var tp=Math.ceil(filteredData.length/PER_PAGE)||1;
  if(p<1||p>tp)return;
  curPage=p;renderPage();
}

function setF(f,el){
  filt=f;

  el.classList.add('on');
  render();
}

      +'<div class="evac-item"><div class="evac-icon">📍</div><div class="evac-info"><div class="evac-label">대사관 주소</div><div class="evac-value">'+evac.address+'</div></div></div>'
      +'<div class="evac-item"><div class="evac-icon">🏃</div><div class="evac-info"><div class="evac-label">대피 방법</div><div class="evac-value">'+evac.method.replace(/\n/g,'<br>')+'</div></div></div>'
      +'<div class="evac-item"><div class="evac-icon">🛡️</div><div class="evac-info"><div class="evac-label">인근 안전 국가</div><div class="evac-value"><div class="safe-countries">'+safeChips+'</div></div></div></div>'
      +'<div style="margin-top:10px;padding:8px;background:#fff;border-radius:8px;text-align:center"><span style="font-size:11px;color:#9a3412">📱 24시간 영사콜센터: </span><a href="tel:+82-2-3210-0404" style="font-size:13px;font-weight:700;color:#c2410c">+82-2-3210-0404</a></div></div>';
  } else {
    document.getElementById('evacSection').style.display='none';
  }
  var savedNick=localStorage.getItem('reportNick');
  if(savedNick)document.getElementById('reportNick').value=savedNick;
  loadReports(currentCountryEn);
  document.getElementById('mNews').innerHTML='<div class="loading"><div class="spin"></div></div>';
  fetch(API+'/api/news/'+encodeURIComponent(c.country_name))
    .then(function(r){return r.json();}).then(function(d){
      if(!d.data||!d.data.length){document.getElementById('mNews').innerHTML='<div style="color:#aaa;font-size:13px;padding:8px 0">최근 뉴스가 없어요</div>';return;}
      document.getElementById('mNews').innerHTML=d.data.map(function(n){
        var dateStr = '';
        if(n.pub_date){
          var d = new Date(n.pub_date);
          dateStr = d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();}
          return '<div class="news-item"><div class="news-title"><a href="'+n.link+'" target="_blank">'+n.title+'</a></div><div class="news-meta">'+(n.source||'')+' · '+dateStr+'</div></div>';
      }).join('');
    }).catch(function(){document.getElementById('mNews').innerHTML='<div style="color:#aaa;font-size:13px">뉴스를 불러올 수 없어요</div>';});
  document.getElementById('mHist').innerHTML='<div class="loading"><div class="spin"></div></div>';
  fetch(API+'/api/history/'+encodeURIComponent(c.country_name))
    .then(function(r){return r.json();}).then(function(d){
      if(!d.data||!d.data.length){document.getElementById('mHist').innerHTML='<div style="color:#aaa;font-size:13px;padding:8px 0">변동 기록이 없어요</div>';return;}
      document.getElementById('mHist').innerHTML=d.data.map(function(h){
        return '<div class="hist-item"><span style="color:#aaa">'+new Date(h.changed_at).toLocaleDateString()+'</span><span style="color:#666">'+h.source_country+'</span><span class="pill '+(PILL[h.old_status]||'')+'">'+( SL[h.old_status]||h.old_status)+'</span><span style="color:#aaa">→</span><span class="pill '+(PILL[h.new_status]||'')+'">'+( SL[h.new_status]||h.new_status)+'</span></div>';
      }).join('');
    }).catch(function(){document.getElementById('mHist').innerHTML='<div style="color:#aaa;font-size:13px">히스토리를 불러올 수 없어요</div>';});
}

function closeM(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function loadReports(countryName){
  document.getElementById('reportList').innerHTML='<div class="loading"><div class="spin"></div></div>';
  fetch(API+'/api/reports/'+encodeURIComponent(countryName))
    .then(function(r){return r.json();}).then(function(d){
      if(!d.data||!d.data.length){document.getElementById('reportList').innerHTML='<div class="report-empty">아직 제보가 없어요</div>';return;}
      document.getElementById('reportList').innerHTML=d.data.map(function(r){
        var isLiked=likedReports.indexOf(r.id)>=0;
        return '<div class="report-item"><div class="report-header"><span class="report-nick-label">'+( r.nickname||'익명')+'</span></div><div class="report-content">'+r.content+'</div><button class="report-like'+(isLiked?' liked':'')+'" onclick="likeReport('+r.id+',this)">❤️ '+(r.likes||0)+'</button></div>';
      }).join('');
    }).catch(function(){document.getElementById('reportList').innerHTML='<div class="report-empty">제보를 불러올 수 없어요</div>';});
}

function submitReport(){
  var nick=document.getElementById('reportNick').value.trim()||'익명';
  var content=document.getElementById('reportText').value.trim();
  if(!content){alert('내용을 입력해주세요!');return;}
  if(!currentCountryEn)return;
  var btn=document.querySelector('.report-submit');
  btn.textContent='등록 중...';btn.disabled=true;
  fetch(API+'/api/reports/'+encodeURIComponent(currentCountryEn),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:nick,content:content})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.success){document.getElementById('reportText').value='';document.getElementById('reportCharCount').textContent='0';loadReports(currentCountryEn);localStorage.setItem('reportNick',nick);}
      else{alert(d.message||'오류가 발생했어요');}
    }).catch(function(){alert('오류가 발생했어요');})
    .finally(function(){btn.textContent='제보하기';btn.disabled=false;});
}

function likeReport(id,btn){
  if(likedReports.indexOf(id)>=0)return;
  fetch(API+'/api/reports/'+id+'/like',{method:'POST'})
    .then(function(r){return r.json();}).then(function(d){
      if(d.success){likedReports.push(id);localStorage.setItem('likedReports',JSON.stringify(likedReports));btn.classList.add('liked');var count=parseInt(btn.textContent.replace(/[^0-9]/g,''))+1;btn.textContent='❤️ '+count;}
    });
}

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function shareApp(type){
  var url='https://web-production-bbd77.up.railway.app';
  var danger=data.filter(function(c){return c.level==='위험';}).length;
  var text='🌍 RunAway - 대사관 철수 현황\n현재 '+danger+'개국 위험 단계!\n여행 전 꼭 확인하세요\n\n'+url;
  if(navigator.share){navigator.share({title:'RunAway',text:text,url:url}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){showToast('🔗 링크 복사됐어요!');});}
}

function shareCountry(type){
  if(!currentCountry)return;
  var name=lang==='ko'?currentCountry.country_name:currentCountry.country_name_en;
  var text='🌍 '+name+' 대사관 현황\n상태: '+currentCountry.level+'\n\nhttps://web-production-bbd77.up.railway.app';
  if(type==='twitter'){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');return;}
  if(navigator.share){navigator.share({title:name,text:text}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){showToast('복사됐어요!');});}
}

function updateViralBanner(){
  var danger=data.filter(function(c){return c.level==='위험';}).length;
  if(danger>0)document.getElementById('viralText').textContent='🚨 현재 '+danger+'개국 위험 단계';
  document.getElementById('viralRight').textContent='👁 '+(Math.floor(Math.random()*50)+20)+'명 확인 중';
}

function load(){
  fetch(API+'/api/countries')
    .then(function(r){return r.json();})
    .then(function(j){
      data=j.data||[];
      document.getElementById('s1').textContent=data.filter(function(c){return c.level==='위험';}).length;
      document.getElementById('s2').textContent=data.filter(function(c){return c.level==='주의요망';}).length;
      document.getElementById('s3').textContent=data.filter(function(c){return c.level==='안전';}).length;
      var dang=data.filter(function(c){return c.level==='위험';});
      if(dang.length){document.getElementById('alertBox').textContent='🚨 '+dang.slice(0,5).map(function(c){return c.country_name;}).join(', ')+' 등 '+dang.length+'개국 위험';document.getElementById('alertBox').style.display='block';}
      render();
      updateViralBanner();
      if(mapOK)updateMarkers();
      if(tab==='fav')renderFav();
    })
    .catch(function(e){
      document.getElementById('list').innerHTML='<div class="empty">⚠️ 서버에 연결할 수 없어요</div>';
    });
}

applyT();
load();
setInterval(load, 5*60*1000);
</script>
